name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v, for example 0.3.0"
        required: true
        default: "0.3.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "APP_VERSION=${{ github.event.inputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Append
            "RELEASE_TAG=v${{ github.event.inputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            $tag = "${{ github.ref_name }}"
            "APP_VERSION=$($tag.TrimStart('v'))" | Out-File -FilePath $env:GITHUB_ENV -Append
            "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build executable
        shell: pwsh
        run: |
          python -m pip install --upgrade pip pyinstaller
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name BitcoinMonitor bitcoin_monitor_windows.py

      - name: Prepare release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -Force -Path dist\BitcoinMonitor.exe -Destination release\BitcoinMonitor.exe
          $sha = (Get-FileHash -Algorithm SHA256 -Path release\BitcoinMonitor.exe).Hash.ToLowerInvariant()
          $manifest = [ordered]@{
            version = "$env:APP_VERSION"
            release_url = "https://github.com/${{ github.repository }}/releases/tag/$env:RELEASE_TAG"
            download_url = "https://github.com/${{ github.repository }}/releases/download/$env:RELEASE_TAG/BitcoinMonitor.exe"
            sha256 = $sha
            notes = @(
              "Cache local em SQLite para reduzir falhas e rate limit.",
              "Novas abas de Rede e Derivativos com mempool blocks, funding, open interest, long/short e opcoes Deribit.",
              "Indicadores avancados no grafico: EMA, Keltner, Donchian, Ichimoku, ATR, ADX, Stoch RSI, MFI, OBV e VWMA.",
              "Noticias com mais fontes, classificacao por tema e impacto."
            )
          }
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText("release\update_manifest.json", ($manifest | ConvertTo-Json -Depth 4), $utf8NoBom)
          Compress-Archive -Path release\* -DestinationPath "BitcoinMonitor-$env:RELEASE_TAG-release.zip"

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$env:RELEASE_TAG" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:RELEASE_TAG" --title "$env:RELEASE_TAG" --notes-file release\update_manifest.json
          }
          gh release upload "$env:RELEASE_TAG" release\BitcoinMonitor.exe "BitcoinMonitor-$env:RELEASE_TAG-release.zip" release\update_manifest.json --clobber
