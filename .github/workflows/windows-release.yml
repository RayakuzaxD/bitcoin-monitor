name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v, for example 0.4.1"
        required: true
        default: "0.4.1"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "APP_VERSION=${{ github.event.inputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Append
            "RELEASE_TAG=v${{ github.event.inputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            $tag = "${{ github.ref_name }}"
            "APP_VERSION=$($tag.TrimStart('v'))" | Out-File -FilePath $env:GITHUB_ENV -Append
            "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build executable
        shell: pwsh
        run: |
          python -m pip install --upgrade pip pyinstaller
          $pythonRoot = (python -c "import sys; print(sys.base_prefix)").Trim()
          $runtimeBinaries = @()
          foreach ($dll in @("vcruntime140.dll", "vcruntime140_1.dll")) {
            $candidate = Join-Path $pythonRoot $dll
            if (Test-Path $candidate) {
              $runtimeBinaries += @("--add-binary", "$candidate;.")
            }
          }
          python -m PyInstaller --noconfirm --clean --onefile --windowed --noupx --name BitcoinMonitor @runtimeBinaries bitcoin_monitor_windows.py

      - name: Prepare release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -Force -Path dist\BitcoinMonitor.exe -Destination release\BitcoinMonitor.exe
          $sha = (Get-FileHash -Algorithm SHA256 -Path release\BitcoinMonitor.exe).Hash.ToLowerInvariant()
          $manifest = [ordered]@{
            version = "$env:APP_VERSION"
            release_url = "https://github.com/${{ github.repository }}/releases/tag/$env:RELEASE_TAG"
            download_url = "https://github.com/${{ github.repository }}/releases/download/$env:RELEASE_TAG/BitcoinMonitor.exe"
            sha256 = $sha
            notes = @(
              "Correcao do empacotamento Windows para incluir vcruntime140_1.dll exigida pelo Python 3.13.",
              "Build gerada sem UPX para reduzir falso positivo e falhas de carregamento de DLL.",
              "Mantem a aba Macro/Ciclo e os indicadores diarios adicionados na v0.4.0."
            )
          }
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText("release\update_manifest.json", ($manifest | ConvertTo-Json -Depth 4), $utf8NoBom)
          Compress-Archive -Path release\* -DestinationPath "BitcoinMonitor-$env:RELEASE_TAG-release.zip"

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$env:RELEASE_TAG" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:RELEASE_TAG" --title "$env:RELEASE_TAG" --notes-file release\update_manifest.json
          }
          gh release upload "$env:RELEASE_TAG" release\BitcoinMonitor.exe "BitcoinMonitor-$env:RELEASE_TAG-release.zip" release\update_manifest.json --clobber
